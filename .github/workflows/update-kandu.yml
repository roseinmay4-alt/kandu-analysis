name: Update Kandu Data

on:
  schedule:
    - cron: "0,30 0-5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: |
          pip install -r requirements.txt

      - name: Fetch data
        run: |
          python app/fetch.py

      - name: Make JSON
        run: |
          python app/make_json.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/data.json
          git diff --cached --quiet || git commit -m "Auto update kandu data"
          git push