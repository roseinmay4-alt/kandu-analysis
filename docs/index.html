<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kandu 攻略サイト</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <header class="site-header">
        <h1>kandu 攻略サイト</h1>
        <p>カンドゥーの混雑・残席をチェック！</p>
      </header>

      <section class="side-card">
        <h2>日付を選択</h2>

        <div class="calendar-header">
          <button id="prevMonth">‹</button>
          <strong id="calendarTitle"></strong>
          <button id="nextMonth">›</button>
        </div>

        <div class="week-row">
          <span class="sun">日</span>
          <span>月</span>
          <span>火</span>
          <span>水</span>
          <span>木</span>
          <span>金</span>
          <span class="sat">土</span>
        </div>

        <div id="calendar" class="calendar"></div>

        <p class="legend"><span></span>データのある日</p>
      </section>

      <section class="side-card">
        <h2>人気ランキング TOP10</h2>
        <p id="rankingSub" class="small">直近7日間の人気順</p>
        <ol id="weeklyRanking" class="weekly-ranking"></ol>
      </section>

      <p class="notice">※ 集計データは非公式です。実際の予約状況は公式サイトで確認してください。</p>
    </aside>

    <main class="main">
      <section class="main-header">
        <div>
          <h2 id="pageTitle">本日のデータ</h2>
          <p id="updatedAt"></p>
        </div>
        <div class="badge">リアルタイム</div>
      </section>

      <section class="panel">
        <div class="table-title">
          <div>
            <h2>残席推移表</h2>
            <div id="partTabs" class="part-tabs"></div>
          </div>
          <p id="selectedDateLabel"></p>
        </div>

        <div class="legend-row">
          <span><i class="before"></i>まだ体験開始前</span>
          <span><i class="during"></i>体験中の時間帯</span>
          <span><i class="after"></i>体験終了後</span>
        </div>

        <div class="pivot-wrap">
          <table id="pivotTable"></table>
        </div>

        <div id="mobileCards" class="mobile-cards"></div>
      </section>
    </main>
  </div>

<script>
let siteData = {};
let currentDate = new Date();
let selectedDateKey = "";
let selectedPartKey = "part1";

function pad(n) {
  return String(n).padStart(2, "0");
}

function toDateKey(date) {
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

function formatDateJa(dateKey) {
  const [y, m, d] = dateKey.split("-");
  return `${y}年${Number(m)}月${Number(d)}日`;
}

function timeToMinutes(time) {
  if (!time || !time.includes(":")) return null;
  const [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

function cleanJobName(name) {
  return String(name)
    .replace(/\[([^=\]]+)=([^\]]+)\]/g, "$1")
    .replace(/\[/g, "")
    .replace(/\]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

async function loadData() {
  const res = await fetch("data.json?ts=" + Date.now());
  siteData = await res.json();

  const dates = getDateKeys();
  if (dates.length > 0) {
    currentDate = new Date(dates[dates.length - 1]);
    selectedDateKey = dates[dates.length - 1];
  }

  document.getElementById("prevMonth").addEventListener("click", () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  });

  document.getElementById("nextMonth").addEventListener("click", () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  });

  renderPage();
}

function getDateStore() {
  return siteData.dates || siteData.days || {};
}

function getDateKeys() {
  return Object.keys(getDateStore()).sort();
}

function getDayData(dateKey) {
  return getDateStore()?.[dateKey] || null;
}

function convertDayDataToPivot(dayData) {
  if (!dayData || !dayData.jobs) return null;

  const rows = [];

  dayData.jobs.forEach(jobData => {
    jobData.rows.forEach(row => {
      rows.push({
        job: cleanJobName(jobData.job),
        start: row.start,
        end: row.end,
        capacity: row.capacity,
        values: row.values
      });
    });
  });

  return {
    times: dayData.fetch_times || [],
    rows: rows
  };
}

function getParts(dateKey) {
  const dayData = getDayData(dateKey);
  if (!dayData) return {};

  if (dayData.parts) {
    return dayData.parts;
  }

  return {
    part1: {
      label: "1部",
      updated_at: siteData.updated_at || dayData.updated_at || "",
      pivot: convertDayDataToPivot(dayData)
    }
  };
}

function getAvailablePartKeys(dateKey) {
  return Object.keys(getParts(dateKey));
}

function normalizePivot(partData) {
  if (!partData) return null;

  if (partData.pivot) {
    return partData.pivot;
  }

  return {
    times: partData.times || [],
    rows: partData.rows || []
  };
}

function renderPage() {
  renderCalendar();

  const dates = getDateKeys();
  if (!selectedDateKey && dates.length > 0) {
    selectedDateKey = dates[dates.length - 1];
  }

  renderRanking();
  renderDate(selectedDateKey);
}

function renderCalendar() {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById("calendarTitle").textContent = `${year}年${month + 1}月`;

  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const startDay = first.getDay();

  for (let i = 0; i < startDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let day = 1; day <= last.getDate(); day++) {
    const date = new Date(year, month, day);
    const key = toDateKey(date);
    const btn = document.createElement("button");

    btn.textContent = day;
    btn.className = "calendar-day";

    if (getDayData(key)) {
      btn.classList.add("has-data");

      if (key === selectedDateKey) {
        btn.classList.add("selected");
      }

      btn.addEventListener("click", () => {
        selectedDateKey = key;
        selectedPartKey = "part1";
        renderDate(key);
        renderCalendar();
      });
    } else {
      btn.classList.add("no-data");
    }

    calendar.appendChild(btn);
  }
}

function renderDate(dateKey) {
  const dayData = getDayData(dateKey);

  document.getElementById("selectedDateLabel").textContent = dateKey ? formatDateJa(dateKey) : "";

  if (!dayData) {
    document.getElementById("pageTitle").textContent = "データなし";
    document.getElementById("updatedAt").textContent = "この日のデータはありません";
    document.getElementById("partTabs").innerHTML = "";
    renderPivot(null);
    return;
  }

  document.getElementById("pageTitle").textContent =
    dateKey === toDateKey(new Date()) ? "本日のデータ" : `${formatDateJa(dateKey)} のデータ`;

  const availableParts = getAvailablePartKeys(dateKey);

  if (!availableParts.includes(selectedPartKey)) {
    selectedPartKey = availableParts[0] || "";
  }

  const partData = getParts(dateKey)[selectedPartKey];

  document.getElementById("updatedAt").textContent =
    partData ? `最終更新：${partData.updated_at || dayData.updated_at || siteData.updated_at || ""}（${partData.label}）` : `最終更新：${dayData.updated_at || siteData.updated_at || ""}`;

  renderTabs(dateKey);
  renderPivot(normalizePivot(partData));
}

function renderTabs(dateKey) {
  const tabs = document.getElementById("partTabs");
  tabs.innerHTML = "";

  const parts = getParts(dateKey);

  Object.entries(parts).forEach(([partKey, partData]) => {
    const btn = document.createElement("button");
    btn.className = "part-tab";
    btn.textContent = partData.label || partKey;
    btn.dataset.part = partKey;

    if (partKey === selectedPartKey) {
      btn.classList.add("active");
    }

    btn.addEventListener("click", () => {
      selectedPartKey = partKey;
      renderDate(selectedDateKey);
    });

    tabs.appendChild(btn);
  });
}

function renderRanking() {
  const rankingEl = document.getElementById("weeklyRanking");
  const sub = document.getElementById("rankingSub");

  rankingEl.innerHTML = "";

  const weeklyRanking = siteData.weekly_ranking || [];

  if (weeklyRanking.length === 0) {
    sub.textContent = "ランキングデータなし";
    return;
  }

  sub.textContent = "直近7日間の人気順";

  weeklyRanking.forEach(item => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span class="rank-num">${item.rank}</span>
      <strong>${cleanJobName(item.job)}</strong>
    `;

    rankingEl.appendChild(li);
  });
}

function renderPivot(pivot) {
  const table = document.getElementById("pivotTable");
  const mobileCards = document.getElementById("mobileCards");

  table.innerHTML = "";
  mobileCards.innerHTML = "";

  if (!pivot || !pivot.rows || pivot.rows.length === 0) {
    table.innerHTML = "<tr><td>データがありません</td></tr>";
    mobileCards.innerHTML = "<p class='mobile-empty'>データがありません</p>";
    return;
  }

  renderPcTable(pivot);
  renderMobileCards(pivot);
}

function renderPcTable(pivot) {
  const table = document.getElementById("pivotTable");

  const thead = document.createElement("thead");
  const headerRow = document.createElement("tr");

  headerRow.innerHTML = `<th>職業</th><th>開始時間</th>`;

  pivot.times.forEach(time => {
    headerRow.innerHTML += `<th>${time}</th>`;
  });

  thead.appendChild(headerRow);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");

  const jobRowCount = {};
  pivot.rows.forEach(row => {
    const jobName = cleanJobName(row.job);
    jobRowCount[jobName] = (jobRowCount[jobName] || 0) + 1;
  });

  let prevJob = "";

  pivot.rows.forEach(row => {
    const tr = document.createElement("tr");
    const jobName = cleanJobName(row.job);

    if (jobName !== prevJob) {
      const tdJob = document.createElement("td");
      tdJob.textContent = jobName;
      tdJob.rowSpan = jobRowCount[jobName];
      tdJob.className = "job-cell";
      tr.appendChild(tdJob);
      prevJob = jobName;
    }

    const tdStart = document.createElement("td");
    tdStart.textContent = row.start;
    tdStart.className = "start-cell";
    tr.appendChild(tdStart);

    const startMinutes = timeToMinutes(row.start);

    pivot.times.forEach(time => {
      const td = document.createElement("td");
      const value = row.values?.[time] ?? "";
      td.textContent = value;

      const headerMinutes = timeToMinutes(time);

      if (headerMinutes !== null && startMinutes !== null) {
        if (headerMinutes > startMinutes) {
          td.classList.add("after-cell");
        } else if (headerMinutes === startMinutes) {
          td.classList.add("during-cell");
        } else {
          td.classList.add("before-cell");
        }
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
}

function renderMobileCards(pivot) {
  const mobileCards = document.getElementById("mobileCards");
  mobileCards.innerHTML = "";

  const jobs = {};

  pivot.rows.forEach(row => {
    const jobName = cleanJobName(row.job);

    if (!jobs[jobName]) {
      jobs[jobName] = [];
    }

    jobs[jobName].push(row);
  });

  Object.entries(jobs).forEach(([job, rows]) => {
    const card = document.createElement("section");
    card.className = "mobile-job-card";

    const title = document.createElement("h3");
    title.textContent = job;
    card.appendChild(title);

    const table = document.createElement("table");
    table.className = "mobile-mini-table";

    const thead = document.createElement("thead");
    const headRow = document.createElement("tr");

    headRow.innerHTML = `<th>開始</th>`;

    pivot.times.forEach(time => {
      headRow.innerHTML += `<th>${time}</th>`;
    });

    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");

    rows.forEach(row => {
      const tr = document.createElement("tr");

      const startTh = document.createElement("th");
      startTh.textContent = row.start;
      startTh.className = "mobile-start-cell";
      tr.appendChild(startTh);

      const startMinutes = timeToMinutes(row.start);

      pivot.times.forEach(time => {
        const td = document.createElement("td");
        const value = row.values?.[time] ?? "";
        td.textContent = value === "" ? "-" : value;

        const headerMinutes = timeToMinutes(time);

        if (headerMinutes !== null && startMinutes !== null) {
          if (headerMinutes > startMinutes) {
            td.classList.add("after");
          } else if (headerMinutes === startMinutes) {
            td.classList.add("during");
          } else {
            td.classList.add("before");
          }
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    card.appendChild(table);
    mobileCards.appendChild(card);
  });
}

loadData();
</script>
</body>
</html>
