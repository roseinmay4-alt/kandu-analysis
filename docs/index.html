<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kandu Analysis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>Kandu Analysis</h1>
  <p>日付別ランキング・集計データ</p>
</header>

<main>
  <section class="panel">
    <h2>日付を選択</h2>
    <input type="date" id="datePicker" />
    <p id="updated"></p>
    <p id="memo"></p>
  </section>

  <section>
    <h2>人気ランキング</h2>
    <div id="ranking" class="ranking"></div>
  </section>

  <section>
    <h2>集計データ表</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>職業</th>
            <th>定員</th>
            <th>体験時間</th>
            <th>開催回数</th>
            <th>残席合計</th>
          </tr>
        </thead>
        <tbody id="summary"></tbody>
      </table>
    </div>
  </section>
</main>

<footer>
  <p>非公式データです。実際の予約状況は公式サイトで確認してください。</p>
</footer>

<script>
let allData = {};

async function loadData() {
  const res = await fetch("data.json");
  allData = await res.json();

  const datePicker = document.getElementById("datePicker");

  const dataDate = allData.updated
    ? allData.updated.split(" ")[0].replaceAll("/", "-")
    : "";

  datePicker.value = dataDate || "2026-07-15";
  datePicker.addEventListener("change", render);

  render();
}

function render() {
  const selectedDate = document.getElementById("datePicker").value;

  const dataDate = allData.updated
    ? allData.updated.split(" ")[0].replaceAll("/", "-")
    : "";

  const rankingEl = document.getElementById("ranking");
  const summaryEl = document.getElementById("summary");

  if (selectedDate !== dataDate) {
    document.getElementById("updated").textContent = "";
    document.getElementById("memo").textContent = "この日のデータはまだありません。";
    rankingEl.innerHTML = "";
    summaryEl.innerHTML = "";
    return;
  }

  document.getElementById("updated").textContent = "最終更新：" + allData.updated;
  document.getElementById("memo").textContent = "";

  rankingEl.innerHTML = allData.ranking.map(item => `
    <div class="rank-card">
      <span>${item.rank}</span>
      <strong>${item.name}</strong>
      <p>残席合計：${item.score}</p>
    </div>
  `).join("");

  const summaryMap = new Map();

  allData.activities.forEach(item => {
    const name = item["職業"];

    if (!summaryMap.has(name)) {
      summaryMap.set(name, {
        name: name,
        capacity: item["定員"],
        duration: item["体験時間"],
        sessions: 0,
        seats: 0
      });
    }

    const row = summaryMap.get(name);
    row.sessions += 1;
    row.seats += Number(item["残席"]);
  });

  const summary = Array.from(summaryMap.values());

  summaryEl.innerHTML = summary.map(item => `
    <tr>
      <td>${item.name}</td>
      <td>${item.capacity}人</td>
      <td>${item.duration}分</td>
      <td>${item.sessions}回</td>
      <td>${item.seats}</td>
    </tr>
  `).join("");
}

loadData();
</script>
</body>
</html>
